# Sokaris ecosystem environment — acp.actproof.io demo instance

services:
  - name: acp-server
    host: localhost
    port: 3075
    notes: "ACP v0.1 — context sharing between agents"

  - name: bridge-proxy
    host: localhost
    port: 8090
    notes: "Java Spring Boot — WebSocket proxy to Firebird agents"

  - name: lr-engine
    host: localhost
    port: 3090
    notes: "License Renewal automation"

  - name: helpdesk-v3
    host: localhost
    port: 3010
    notes: "Support panel"

  - name: smtp-worker
    host: localhost
    port: 4001
    notes: "Central OUTBOX email sender"

  - name: ksef-guide
    host: localhost
    port: 3091
    notes: "ksef.faktura-nt.pl API backend"

important_files:
  - /opt/acp-server/deploy/seed/rules.yaml
  - /opt/acp-server/.acp/journal.jsonl

do_not_touch:
  - /opt/acp-server-antek-backup/
